name: CI-CD
run-name: ${{ github.actor }} deployed code to ${{ github.ref_name }}

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run build

      - name: Save build cache
        uses: actions/cache/save@v4
        with:
          path: |
            .next
            node_modules
            ~/.cache/Cypress
          key: build-${{ github.sha }}

  cypress-run:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        
      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10

      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .next
            node_modules
            ~/.cache/Cypress
          key: build-${{ github.sha }}
          
      - name: Cypress run
        uses: cypress-io/github-action@v7
        with:
          install: false
          start: pnpm run start

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore
          
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: cypress-videos
          path: cypress/videos
          if-no-files-found: ignore

  e2e-tests:
    needs: cypress-run
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        browser: [chrome, edge, firefox]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10

      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .next
            node_modules
            ~/.cache/Cypress
          key: build-${{ github.sha }}

      - name: Setup Firefox
        if: matrix.browser == 'firefox'
        uses: browser-actions/setup-firefox@v2

      - name: Run e2e tests on ${{ matrix.browser }}
        uses: cypress-io/github-action@v7
        with:
          install: false
          start: pnpm run start
          browser: ${{ matrix.browser }}

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: cypress-screenshots-${{ matrix.browser }}
          path: cypress/screenshots
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: cypress-videos-${{ matrix.browser }}
          path: cypress/videos
          if-no-files-found: ignore