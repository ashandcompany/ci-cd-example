name: CI-CD
run-name: ${{ github.actor }} a déployé du code vers ce repo ${{ github.ref_name }}

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Save build cache
        uses: actions/cache/save@v4
        with:
          path: |
            .next
            node_modules
          key: build-${{ github.sha }}

  deploy:
    needs: build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .next
            node_modules
          key: build-${{ github.sha }}

      - name: Deploy
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET: /home/debian/github/ci-cd-example
          ARGS: "-rlgoDzvc -i --delete"
          EXCLUDE: "/node_modules/, /.git/"
          SCRIPT_AFTER: |
            export PATH="$HOME/.local/share/pnpm:$PATH"
            cd /home/debian/github/ci-cd-example
            pnpm install --prod --frozen-lockfile
            pm2 restart next-app || pm2 start /home/debian/.local/share/pnpm/pnpm --name next-app --interpreter=none -- start