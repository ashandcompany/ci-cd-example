name: CI-CD
run-name: ${{ github.actor }} a déployé du code vers ce repo ${{ github.ref_name }}

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Save build cache
        uses: actions/cache/save@v4
        with:
          path: |
            .next
            node_modules
          key: build-${{ github.sha }}

  build-and-push-docker:
    needs: build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # ✅ Supprimé linux/arm64 + QEMU (x5-10 plus rapide)
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/ci-cd-example/next:latest
            ghcr.io/${{ github.repository_owner }}/ci-cd-example/next:${{ github.sha }}
          # ✅ Cache des layers Docker entre les runs
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/ci-cd-example/next:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/ci-cd-example/next:buildcache,mode=max