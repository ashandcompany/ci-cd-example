name: CI-CD
run-name: ${{ github.actor }} a déployé du code vers ${{ github.ref_name }}

on:
  push:
  pull_request:

jobs:
  build-and-push-docker:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository }}/next:latest
            ghcr.io/${{ github.repository }}/next:${{ github.sha }}

  deploy:
    needs: build-and-push-docker
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GHCR_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            sudo docker pull ghcr.io/${{ github.repository_owner }}/ci-cd-example/next:latest
            sudo docker stop next-app || true
            sudo docker rm next-app || true
            sudo docker run -d \
              --name next-app \
              --restart unless-stopped \
              -p 3000:3000 \
              ghcr.io/${{ github.repository_owner }}/ci-cd-example/next:latest