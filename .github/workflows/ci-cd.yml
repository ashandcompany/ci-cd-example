name: CI-CD
run-name: ${{ github.actor }} a déployé du code sur ${{ github.ref_name }}

on:
  push:
  pull_request:

jobs:
  deploy:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET: /home/debian/github/ci-cd-example
          ARGS: "-rlgoDzvc -i --delete"
          EXCLUDE: "/node_modules/, /.git/, /.next/"
          SCRIPT_AFTER: |
            export PATH="$HOME/.local/share/pnpm:$PATH"
            cd /home/debian/github/ci-cd-example
            pnpm install --frozen-lockfile
            pnpm run build
            pm2 restart next-app || pm2 start /home/debian/.local/share/pnpm/pnpm --name next-app --interpreter=none -- start