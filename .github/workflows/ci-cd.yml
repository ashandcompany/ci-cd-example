name: CI-CD
run-name: ${{ github.actor }} deployed code to ${{ github.ref_name }}

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm' # Cache du store pnpm global (~/.pnpm-store)

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run build

      # Cache séparé pour l'artefact de build + Cypress binaries
      # Clé = SHA du commit → unique par build, partagé entre jobs parallèles
      - name: Save build & Cypress cache
        uses: actions/cache/save@v4
        with:
          path: |
            .next
            node_modules
            ~/.cache/Cypress
          key: build-${{ github.sha }}

  e2e-tests:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Continue les autres browsers si l'un échoue
      matrix:
        browser: [chrome, edge, firefox]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # Restore du cache build (node_modules + .next + Cypress binary)
      # restore-keys = fallback si le SHA exact n'est pas trouvé (ex: reruns)
      - name: Restore build & Cypress cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .next
            node_modules
            ~/.cache/Cypress
          key: build-${{ github.sha }}
          restore-keys: |
            build-

      # Firefox nécessite le browser installé sur le runner
      - name: Install Firefox
        if: matrix.browser == 'firefox'
        uses: browser-actions/setup-firefox@v1
        with:
          firefox-version: '133.0'

      - name: Install Edge
        if: matrix.browser == 'edge'
        uses: browser-actions/setup-edge@v1

      - name: Cypress E2E (${{ matrix.browser }})
        uses: cypress-io/github-action@v6
        with:
          install: false # On utilise le cache, pas de réinstall
          start: pnpm run start
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 60
          browser: ${{ matrix.browser }}

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure() # Seulement en cas d'échec, pas toujours
        with:
          name: cypress-screenshots-${{ matrix.browser }}
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Upload videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-videos-${{ matrix.browser }}
          path: cypress/videos
          if-no-files-found: ignore