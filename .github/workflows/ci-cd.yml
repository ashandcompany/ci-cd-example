name: CI-CD
run-name: ${{ github.actor }} deployed code to ${{ github.ref_name }}
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          corepack-version: 10
      - run: pnpm install
      - run: pnpm run build
  test:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          corepack-version: 10
      - name: Cypress run
        uses: cypress-io/github-action@v7
        with:
          browser: chrome-for-testing
